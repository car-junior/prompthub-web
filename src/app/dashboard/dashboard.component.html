<div class="dash-layout">

  <!-- Sidebar -->
  <aside class="sidebar">

    <!-- Brand -->
    <div class="sidebar-brand">
      <span class="brand-emoji">🤖</span>
      <span class="brand-name">PromptHub</span>
    </div>

    <!-- User profile block -->
    <div class="sidebar-profile" (click)="goToProfile()" matTooltip="Meu perfil">
      <div class="sidebar-avatar">{{ username?.charAt(0)?.toUpperCase() }}</div>
      <span class="sidebar-username">{{ username }}</span>
      <div class="sidebar-profile-divider"></div>
    </div>

    <!-- Nav -->
    <nav class="sidebar-nav">
      @for (item of visibleNavItems; track item.route) {
        <a class="nav-link"
           [routerLink]="item.route"
           routerLinkActive="active">
          <mat-icon>{{ item.icon }}</mat-icon>
          {{ item.label }}
        </a>
      }
    </nav>

    <!-- Logout -->
    <div class="sidebar-footer">
      <button class="nav-link logout-link" (click)="logout()">
        <mat-icon>logout</mat-icon>
        Sair
      </button>
    </div>

  </aside>

  <!-- Content -->
  <main class="main-area">
    <router-outlet />
  </main>

</div>
