<h2 class="ph-dialog-title">
  <mat-icon>manage_accounts</mat-icon>
  Alterar função
</h2>

<mat-dialog-content class="ph-dialog-content">
  <form [formGroup]="form" novalidate>
    <mat-form-field appearance="outline">
      <mat-label>Função global</mat-label>
      <mat-select formControlName="role">
        @for (r of roles; track r.value) {
          <mat-option [value]="r.value">{{ r.label }}</mat-option>
        }
      </mat-select>
      @if (role.hasError('required') && role.touched) {
        <mat-error>Selecione uma função</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions class="ph-dialog-actions">
  <button mat-stroked-button (click)="onCancel()">Cancelar</button>
  <button mat-raised-button color="primary" (click)="onConfirm()">Salvar</button>
</mat-dialog-actions>
